name: Daily News Briefing

on:
  schedule:
    - cron: "0 6 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        required: true
        default: "run"
        type: choice
        options:
          - run
          - preview
          - send-test

jobs:
  daily-news:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    env:
      PYTHONPATH: src
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      OPENAI_REASONING_EFFORT: ${{ secrets.OPENAI_REASONING_EFFORT }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      MODE: ${{ github.event_name == 'schedule' && 'run' || inputs.mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Compile Check
        shell: bash
        run: python -m compileall src/daily_news_briefing

      - name: Run Tests
        shell: bash
        run: python -m unittest discover -s tests -v

      - name: Run Command
        shell: bash
        run: |
          mkdir -p output
          if [ "$MODE" = "preview" ]; then
            RESULT=$(python -m daily_news_briefing.cli preview --output output/preview-latest.html)
          elif [ "$MODE" = "send-test" ]; then
            RESULT=$(python -m daily_news_briefing.cli send-test)
          else
            RESULT=$(python -m daily_news_briefing.cli run)
          fi
          echo "$RESULT"
          printf '%s' "$RESULT" > output/run-result.json

      - name: Write Workflow Summary
        if: env.MODE != 'send-test'
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from daily_news_briefing.cli import _summary_markdown_from_payload

          payload = json.loads(Path("output/run-result.json").read_text(encoding="utf-8"))
          summary = _summary_markdown_from_payload(payload)
          with open(Path.cwd() / Path(".github-summary.tmp"), "w", encoding="utf-8") as handle:
              handle.write(summary)
          print(summary)
          PY
          cat .github-summary.tmp >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Preview Artifact
        if: env.MODE == 'preview'
        uses: actions/upload-artifact@v4
        with:
          name: daily-news-preview
          path: |
            output/preview-latest.html
            output/preview-latest.txt
            output/run-result.json

      - name: Commit State File
        if: env.MODE == 'run'
        shell: bash
        run: |
          if git diff --quiet -- state/seen_events.json; then
            echo "No state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/seen_events.json
          git commit -m "chore: update seen events state"
          git push
