name: Daily News Briefing

on:
  schedule:
    - cron: "0 8 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        required: true
        default: "run"
        type: choice
        options:
          - run
          - preview
          - send-test

jobs:
  daily-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      MODE: ${{ github.event_name == 'schedule' && 'run' || inputs.mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Package
        shell: bash
        run: python -m pip install -e .

      - name: Run Command
        shell: bash
        run: |
          if [ "$MODE" = "preview" ]; then
            python -m daily_news_briefing.cli preview --output output/preview-latest.html
          elif [ "$MODE" = "send-test" ]; then
            python -m daily_news_briefing.cli send-test
          else
            python -m daily_news_briefing.cli run
          fi

      - name: Upload Preview Artifact
        if: env.MODE == 'preview'
        uses: actions/upload-artifact@v4
        with:
          name: daily-news-preview
          path: |
            output/preview-latest.html
            output/preview-latest.txt

      - name: Commit State File
        if: env.MODE == 'run'
        shell: bash
        run: |
          if git diff --quiet -- state/seen_events.json; then
            echo "No state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/seen_events.json
          git commit -m "chore: update seen events state"
          git push
